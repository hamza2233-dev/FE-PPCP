<!DOCTYPE html>
<html>
<head>
  <title>Free Eligibility Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; text-align:center; margin-top:100px;">

<h2>Free Eligibility Check</h2>

<form id="leadForm">
  <input type="text" id="phone" placeholder="Phone Number"><br><br>
  <input type="text" id="zipcode" placeholder="Zip Code"><br><br>
  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("leadForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  let phone = document.getElementById("phone").value;
  let zip = document.getElementById("zipcode").value;

  let cleaned = phone.replace(/\D/g, '');

  if (cleaned.length !== 10) {
    alert("Enter valid US number");
    return;
  }

  let url = `/api/send?phone=${cleaned}&zip=${zip}`;

  try {
    let res = await fetch(url);
    let data = await res.json();

    console.log(data);

    if (data.error) {
      alert("Error: " + data.error);
    } else {
      alert("Connected successfully!");
    }

  } catch (err) {
    alert("Request failed");
    console.log(err);
  }
});
</script>

</body>
</html>
